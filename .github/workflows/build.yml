name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
        - name: macOS
          os: macos-latest

        - name: iOS
          os: macos-latest
          target: iOS

        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.name }}-geode-build
          path: build\flozwer.paimbnails2.geode

  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: package

    steps:
      - uses: actions/checkout@v4

      - name: Download combined build
        uses: actions/download-artifact@v4
        with:
          name: Build Output
          path: build

      - name: Prepare .geode for installer
        run: |
          $file = Get-ChildItem -Path build -Filter "*.geode" | Select-Object -First 1
          if ($file.Name -ne "flozwer.paimbnails2.geode") {
            Copy-Item $file.FullName -Destination "build\flozwer.paimbnails2.geode" -Force
          }

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Build NSIS installer
        run: |
          cd installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V4 installer.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paimbnails-Windows-Installer
          path: installer\Paimbnails-Installer.exe

  build-macos-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: package

    steps:
      - uses: actions/checkout@v4

      - name: Download combined build
        uses: actions/download-artifact@v4
        with:
          name: Build Output
          path: build

      - name: Prepare .geode for DMG
        run: |
          for f in build/*.geode; do
            if [ "$(basename "$f")" != "flozwer.paimbnails2.geode" ]; then
              cp "$f" build/flozwer.paimbnails2.geode
            fi
            break
          done

      - name: Create ICNS icon from Logo
        run: |
          mkdir -p Paimbnails.iconset
          sips -z 16 16 Logo.png --out Paimbnails.iconset/icon_16x16.png
          sips -z 32 32 Logo.png --out Paimbnails.iconset/icon_16x16@2x.png
          sips -z 32 32 Logo.png --out Paimbnails.iconset/icon_32x32.png
          sips -z 64 64 Logo.png --out Paimbnails.iconset/icon_32x32@2x.png
          sips -z 128 128 Logo.png --out Paimbnails.iconset/icon_128x128.png
          sips -z 256 256 Logo.png --out Paimbnails.iconset/icon_128x128@2x.png
          sips -z 256 256 Logo.png --out Paimbnails.iconset/icon_256x256.png
          sips -z 512 512 Logo.png --out Paimbnails.iconset/icon_256x256@2x.png
          sips -z 512 512 Logo.png --out Paimbnails.iconset/icon_512x512.png
          sips -z 1024 1024 Logo.png --out Paimbnails.iconset/icon_512x512@2x.png
          iconutil -c icns Paimbnails.iconset -o Paimbnails.icns

      - name: Create DMG with icon
        run: |
          mkdir -p "Paimbnails-v${{ github.ref_name }}-macOS"
          cp build/flozwer.paimbnails2.geode "Paimbnails-v${{ github.ref_name }}-macOS/"
          mkdir -p "Paimbnails.app/Contents/MacOS"
          echo '#!/bin/bash' > "Paimbnails.app/Contents/MacOS/Paimbnails"
          echo 'open "https://github.com/Fl0zWer/Paimbnails#installation"' >> "Paimbnails.app/Contents/MacOS/Paimbnails"
          chmod +x "Paimbnails.app/Contents/MacOS/Paimbnails"
          cp -r "Paimbnails-v${{ github.ref_name }}-macOS" "Paimbnails.app/Contents/Resources/"
          cp Paimbnails.icns "Paimbnails.app/Contents/Resources/"
          cat > "Paimbnails.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIconFile</key>
              <string>Paimbnails</string>
          </dict>
          </plist>
          EOF
          mkdir -p dmg-source
          cp -r Paimbnails.app dmg-source/
          cp Paimbnails.icns dmg-source/.VolumeIcon.icns
          hdiutil create -volname "Paimbnails" -srcfolder dmg-source -ov -format UDZO "Paimbnails-macOS.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paimbnails-macOS-DMG
          path: Paimbnails-macOS.dmg

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: actions/checkout@v4

      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: ['build-installer', 'build-macos-dmg', 'build']
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
